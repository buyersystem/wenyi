name: Build executables

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            runner: windows-latest
            artifact: wenyi-windows-x64
            binary: ./dist/wenyi.exe
          - name: Linux x64
            runner: ubuntu-latest
            artifact: wenyi-linux-x64
            binary: ./dist/wenyi

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python -m pip install . pyinstaller

      - name: Build single-file executable
        run: >
          python -m PyInstaller --name wenyi --onefile --clean --noconfirm
          --paths . --collect-all ebooklib --collect-all bs4 --collect-all lxml
          --collect-all openai --collect-all pydantic --collect-all yaml
          --workpath build/pyinstaller --specpath build/pyinstaller-spec
          --distpath dist trans_novel/__main__.py

      - name: Smoke test executable
        shell: bash
        run: ${{ matrix.binary }} --help

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.binary }}
          if-no-files-found: error
          retention-days: 14
